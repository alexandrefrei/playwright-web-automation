name: Feature Branch Testing

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Feature branch to test (e.g., af/newtest/1234-new-feature)'
        required: true
        type: string
      environment:
        description: 'Test environment where feature is deployed'
        required: true
        type: choice
        options:
          - test-environment-1
          - test-environment-2
          - test-environment-3
          - test-environment-4
          - test-environment-5
          - test-environment-6
          - test-environment-7
          - test-environment-8
          - test-environment-9
          - test-environment-10
          - qa
      test_file:
        description: 'Path to test file (e.g., tests/block-question-tests/block-question-checkbox.spec.ts)'
        required: true
        type: string
      default_browser:
        description: 'Default browser for tests'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  feature-test:
    timeout-minutes: 60
    name: 🧪 Execution ${{ inputs.branch }} on ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout branch ${{ inputs.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          lfs: true
      #
      - name: 📦 Install dependencies
        run: npm install
      #  
      - name: 🖥️ Install Playwright Browsers
        run: |
          BROWSER="${{ inputs.default_browser }}"
          if [ "$BROWSER" == "chrome" ]; then
            echo "Installing chromium for chrome input..."
            npx playwright install chromium --with-deps
          else
          echo "Installing $BROWSER..."
           npx playwright install "$BROWSER" --with-deps
          fi
      #
      - name: 🧾 Run test file
        run: |
          echo "🔍 Starting execution..."
          echo "🌿 Branch: $BRANCH_NAME"
          echo "🌍 Environment: $ENVIRONMENT"
          echo "📄 Test file: $TEST_FILE"
          echo "🌐 Browser: $DEFAULT_BROWSER"

          npx playwright test "$TEST_FILE"
        env:
          BRANCH_NAME: ${{ inputs.branch }}
          ENVIRONMENT: ${{ inputs.environment }}
          TEST_FILE: ${{ inputs.test_file }}
          DEFAULT_BROWSER: ${{ inputs.default_browser }}
      #
      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7
      #
      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7
      #
      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🧪 Feature Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Test File:** \`${{ inputs.test_file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Browser:** \`${{ inputs.default_browser }}\`" >> $GITHUB_STEP_SUMMARY
